<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Lookup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Character Lookup</h1>

<div class="search">
    <input type="number" id="characterId" placeholder="Enter Character ID (1-78)" min="1" max="78" />
    <button onclick="loadCharacter()">Search</button>
</div>

<p id="status"></p>

<div id="characterImage" class="hidden">
    <img id="characterImageDisplay" src="" alt="Character" />

    <h2 id="characterName"></h2>
    <table>
        <tbody>
        <tr>
            <th>ID</th>
            <td id="characterID"></td>
        </tr>
        <tr>
            <th>Ki</th>
            <td id="characterKi"></td>
        </tr>
        <tr>
            <th>MaxKi</th>
            <td id="characterMaxKi"></td>
        </tr>
        <tr>
            <th>Race</th>
            <td id="characterRace"></td>
        </tr>
        <tr>
            <th>Gender</th>
            <td id="characterGender"></td>
        </tr>
        <tr>
            <th>Description</th>
            <td id="characterDescription"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
