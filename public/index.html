<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Lookup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Pokémon Lookup</h1>

<div class="search">
    <input type="number" id="characterId" placeholder="Enter Character ID (1-78)" min="1" max="78" />
    <button onclick="loadCharacter()">Search</button>
</div>

<p id="status"></p>

<div id="characterCard" class="card hidden">
    <img id="characterImage" src="" alt="Pokemon sprite" />
    <h2 id="characterName"></h2>
    <table>
        <tbody>
        <tr>
            <th>ID</th>
            <td id="characterRace"></td>
        </tr>
        <tr>
            <th>Height</th>
            <td id="characterHeight"></td>
        </tr>
        <tr>
            <th>Weight</th>
            <td id="characterKi"></td>
        </tr>
        <tr>
            <th>Types</th>
            <td id="characterMaxKi"></td>
        </tr>
        <tr>
            <th>Abilities</th>
            <td id="characterGender"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
